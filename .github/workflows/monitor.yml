name: Assembly site monitor

on:
  schedule:
      - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: assembly-site-monitor
  cancel-in-progress: false

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        run: python scripts/check_site.py

      - name: Commit latest status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update site monitor status"
          file_pattern: docs/status.json
